<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fractalApp Explorer</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; background: #0f172a; color: #e5e7eb; }
    main { box-sizing: border-box; min-height: 100vh; padding: 28px; display: grid; place-items: center; }
    .card { width: min(720px, 100%); border: 1px solid rgba(148, 163, 184, .35); border-radius: 18px; padding: 24px; background: rgba(15, 23, 42, .92); box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .tag { display: inline-flex; border-radius: 999px; padding: 4px 10px; background: rgba(34, 197, 94, .16); color: #86efac; font-size: 12px; }
    h1 { margin: 14px 0 8px; font-size: 28px; }
    p { margin: 0; color: #cbd5e1; line-height: 1.6; }
    code { color: #93c5fd; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <span class="tag">component explorer v1.0.0</span>
      <h1>Explorer</h1>
      <p>File tree component shell. Native file access is not enabled yet.</p>
      <p style="margin-top:14px">Loaded through <code>active.json</code>, sandbox iframe, and Core component reader.</p>
    </section>
  </main>
  <script>
    window.parent.postMessage({ source: 'fractal.component', type: 'health.ready', ok: true, componentId: 'explorer' }, '*');
  </script>
</body>
</html>
