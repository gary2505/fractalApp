<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
      :root { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { margin: 0; background: transparent; color: inherit; }
      main { padding: 32px; }
      .card { border: 1px solid rgba(127,127,127,.25); border-radius: 18px; padding: 24px; }
      h1 { margin: 0 0 12px; font-size: 1.75rem; }
      p { margin: 0; opacity: .78; line-height: 1.55; }
      code { background: rgba(127,127,127,.15); border-radius: 8px; padding: 2px 6px; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Welcome component v1.0.0</h1>
        <p>This HTML is loaded from the real app-data component folder through the Core host.</p>
        <p>It runs inside a sandbox iframe and communicates by <code>postMessage</code>.</p>
      </section>
    </main>
    <script>
      window.parent.postMessage({
        source: 'fractal.component',
        type: 'health.ready',
        componentId: 'welcome',
        ok: true
      }, '*');
    </script>
  </body>
</html>
