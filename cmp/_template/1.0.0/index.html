<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>__COMPONENT_TITLE__</title>
    <style>
      :root { color-scheme: light dark; font-family: Inter, system-ui, sans-serif; }
      body { margin: 0; padding: 16px; background: transparent; color: inherit; }
      .card { border: 1px solid #d4d4d8; border-radius: 12px; padding: 16px; }
      .muted { color: #71717a; font-size: 13px; }
      button { border: 1px solid #a1a1aa; border-radius: 8px; padding: 8px 10px; }
    </style>
  </head>
  <body>
    <main class="card" data-health="ready">
      <h1>__COMPONENT_TITLE__</h1>
      <p class="muted">Versioned iframe component template.</p>
      <button id="ping">Send example intent</button>
      <pre id="out" class="muted">Ready</pre>
    </main>
    <script>
      const componentId = '__COMPONENT_ID__';
      const workflowId = '__WORKFLOW_ID__';
      const startedAt = performance.now();
      const out = document.getElementById('out');

      function traceId(prefix = 'CMP') {
        return `${prefix}${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
      }

      function invoke(command, payload = {}) {
        const request = { apiVersion: 1, traceId: traceId(), componentId, command, payload };
        return new Promise((resolve, reject) => {
          function onMessage(event) {
            const response = event.data;
            if (!response || response.traceId !== request.traceId) return;
            window.removeEventListener('message', onMessage);
            response.ok ? resolve(response.data) : reject(response.error);
          }
          window.addEventListener('message', onMessage);
          window.parent.postMessage({ kind: 'core-bridge', request }, '*');
        });
      }

      function makeIntent(type, payload) {
        return {
          id: `INT-${Date.now().toString(36)}`,
          type,
          source: 'user',
          componentId,
          workflowId,
          traceId: traceId('INT'),
          payload,
        };
      }

      document.getElementById('ping').addEventListener('click', async () => {
        const intent = makeIntent('__COMPONENT_ID__.example', { time: new Date().toISOString() });
        out.textContent = JSON.stringify(intent, null, 2);
      });

      window.parent.postMessage({
        kind: 'health.ready',
        health: {
          ok: true,
          startupMs: Math.round(performance.now() - startedAt),
          loaded: true,
          rendered: true,
          bridgeConnected: true,
          permissionsValid: true,
          errors: [],
        },
      }, '*');

      window.health = { ready: true };
    </script>
  </body>
</html>
